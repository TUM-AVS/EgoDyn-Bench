name: dynamics-benchmark
channels:
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python=3.11

  # Core scientific computing
  - numpy>=1.24.0
  - pandas>=2.0.0
  - scipy>=1.11.0

  # Image processing
  - pillow>=10.0.0

  # Visualization
  - matplotlib>=3.7.0
  - seaborn>=0.12.0

  # Jupyter for analysis
  - jupyter>=1.0.0
  - ipykernel>=6.25.0

  # Progress bars
  - tqdm>=4.65.0

  # Pip packages (not available in conda or better from pip)
  - pip
  - pip:
    # OpenAI API
    - openai>=1.0.0

    # nuScenes devkit (only available via pip)
    - nuscenes-devkit>=1.1.10

    # Optional: Other VLM APIs
    # - google-generativeai>=0.3.0  # For Gemini
    # - anthropic>=0.7.0  # For Claude